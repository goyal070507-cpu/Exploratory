<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLP Lab - Machine Translation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-glow: #8b5cf6;
            --secondary-glow: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Gradients */
        .bg-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 60%);
            opacity: 0.15;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s ease-in-out infinite alternate;
        }
        .bg-blob.secondary {
            background: radial-gradient(circle, var(--secondary-glow) 0%, transparent 60%);
            right: -100px;
            top: 200px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-50px) scale(1.1); }
        }

        header {
            margin-top: 3rem;
            text-align: center;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: -webkit-linear-gradient(45deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 2rem auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Translation Area */
        .translator-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .pane {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        select {
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--primary-glow);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            align-self: center;
            font-size: 1.1rem;
            margin-top: -1rem;
            z-index: 10;
        }
        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Metrics Box */
        .metrics-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-around;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .metric h3 {
            margin: 0;
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .metric p {
            margin: 0.5rem 0 0 0;
            font-size: 1.8rem;
            font-weight: 600;
            color: #10b981; /* Green success */
        }
        
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary-glow);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .translator-box {
                grid-template-columns: 1fr;
            }
            .btn {
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-blob"></div>
    <div class="bg-blob secondary"></div>

    <header>
        <h1>NLP Lab</h1>
        <p style="color: var(--text-muted)">Advanced Hindi to Bengali Neural Machine Translation</p>
    </header>

    <div class="container">
        <!-- Translator UI -->
        <div class="translator-box">
            <!-- Source Pane -->
            <div class="pane">
                <div class="controls">
                    <select disabled>
                        <option>Hindi (Source)</option>
                    </select>
                    <select id="model-select">
                        <option value="nllb">NLLB-600M (Finetuned)</option>
                        <option value="indictrans2">IndicTrans2-320M (Finetuned)</option>
                    </select>
                </div>
                <textarea id="source-text" placeholder="Enter Hindi text here..." style="height: 150px;"></textarea>
                
                <div style="margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="reference-text" style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Reference Bengali (Optional, for scores)</label>
                    <textarea id="reference-text" placeholder="Paste ground-truth Bengali here to compute metrics..." style="height: 80px;"></textarea>
                </div>
            </div>

            <!-- Target Pane -->
            <div class="pane">
                <div class="controls">
                    <select disabled>
                        <option>Bengali (Target)</option>
                    </select>
                    <div class="loader" id="loading-spinner"></div>
                </div>
                <textarea id="target-text" placeholder="Translation will appear here..." readonly></textarea>
            </div>
        </div>

        <button class="btn" id="translate-btn" onclick="translateText()">Translate Text</button>

        <!-- Evaluation Metrics -->
        <div class="metrics-box">
            <div class="metric">
                <h3>BLEU Score</h3>
                <p id="metric-bleu">--</p>
            </div>
            <div class="metric">
                <h3>METEOR</h3>
                <p id="metric-meteor">--</p>
            </div>
            <div class="metric">
                <h3>BERTScore</h3>
                <p id="metric-bert">--</p>
            </div>
            <div class="metric">
                <h3>COMET</h3>
                <p id="metric-comet">--</p>
            </div>
        </div>
    </div>

    <script>
        async function translateText() {
            const sourceText = document.getElementById('source-text').value.trim();
            const referenceText = document.getElementById('reference-text').value.trim();
            const modelChoice = document.getElementById('model-select').value;
            const targetTextArea = document.getElementById('target-text');
            const btn = document.getElementById('translate-btn');
            const spinner = document.getElementById('loading-spinner');

            if (!sourceText) return;

            // UI Loading state
            btn.classList.add('loading');
            spinner.style.display = 'block';
            targetTextArea.value = '';
            
            // Reset metrics UI
            document.getElementById('metric-bleu').innerText = '...';
            document.getElementById('metric-meteor').innerText = '...';
            document.getElementById('metric-bert').innerText = '...';
            document.getElementById('metric-comet').innerText = '...';

            try {
                const response = await fetch('/api/translate/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: sourceText,
                        model: modelChoice,
                        reference: referenceText
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    targetTextArea.value = data.translation;
                    
                    if (data.scores) {
                        document.getElementById('metric-bleu').innerText = data.scores.bleu.toFixed(2);
                        document.getElementById('metric-meteor').innerText = data.scores.meteor.toFixed(4);
                        document.getElementById('metric-bert').innerText = data.scores.bertscore.toFixed(4);
                        document.getElementById('metric-comet').innerText = data.scores.comet.toFixed(4);
                    } else if (referenceText) {
                        document.getElementById('metric-bleu').innerText = 'Err';
                        document.getElementById('metric-meteor').innerText = 'Err';
                        document.getElementById('metric-bert').innerText = 'Err';
                        document.getElementById('metric-comet').innerText = 'Err';
                    } else {
                        document.getElementById('metric-bleu').innerText = 'N/A';
                        document.getElementById('metric-meteor').innerText = 'N/A';
                        document.getElementById('metric-bert').innerText = 'N/A';
                        document.getElementById('metric-comet').innerText = 'N/A';
                    }
                } else {
                    targetTextArea.value = "Error: " + (data.error || "Failed to translate");
                }
            } catch (error) {
                targetTextArea.value = "Network Error: Could not connect to API.";
            } finally {
                // UI Reset state
                btn.classList.remove('loading');
                spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
